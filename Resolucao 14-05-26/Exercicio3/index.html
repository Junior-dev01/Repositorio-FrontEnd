<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Sistema de Notas</title>
    <link rel="stylesheet" type="text/css" href="style.css">
</head>
<body>
    <div class="school-app">
        <h2>Cálculo de Média</h2>
        
        <input type="text" id="nomeAluno" placeholder="Nome do Aluno">
        
        <div class="notas-container">
            <input type="number" id="nota1" placeholder="Nota 1" step="0.1" min="0" max="10">
            <input type="number" id="nota2" placeholder="Nota 2" step="0.1" min="0" max="10">
            <input type="number" id="nota3" placeholder="Nota 3" step="0.1" min="0" max="10">
        </div>

        <button id="btnCalcular">Calcular Situação</button>

        <div id="resultado" class="resultado-box">
            </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
