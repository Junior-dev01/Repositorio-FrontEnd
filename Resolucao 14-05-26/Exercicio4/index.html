<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Infinity Bank - Simulador</title>
    <link rel="stylesheet" type="text/css" href="style.css">
</head>
<body>
    <div class="bank-app">
        <h2>Simulador Infinity Bank</h2>
        
        <div class="field">
            <label>Valor da Venda (R$):</label>
            <input type="number" id="valorVenda" placeholder="0.00" step="0.01">
        </div>

        <div class="field">
            <label>Bandeira do Cartão:</label>
            <select id="bandeira">
                <option value="visa">Visa (2%)</option>
                <option value="master">MasterCard (1.85%)</option>
                <option value="elo">Elo (3%)</option>
            </select>
        </div>

        <div class="field">
            <label>Quantidade de Parcelas:</label>
            <input type="number" id="parcelas" min="1" max="12" value="1">
        </div>

        <button onclick="simularVenda()">Simular Venda</button>

        <div id="resumo" class="resumo-box">
            <!-- Os resultados aparecerão aqui -->
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
