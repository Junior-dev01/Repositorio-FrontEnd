<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Termo Jogo</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    
    <script src="https://unpkg.com/@babel/standalone@7.22.20/babel.min.js"></script>
    
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: #1a1a2e; 
            color: white; 
            margin: 0; 
            display: flex; 
            justify-content: center; 
        }
        .jogo-container { display: flex; flex-direction: column; align-items: center; padding-top: 30px; width: 100%; }
        .grade { display: grid; gap: 8px; margin-top: 20px; }
        .linha { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; }
        .quadrado {
            width: 55px; height: 55px; border: 2px solid #0f3460;
            display: flex; justify-content: center; align-items: center;
            font-size: 2rem; font-weight: bold; text-transform: uppercase;
            border-radius: 4px; background-color: #16213e;
        }
        .correta { background-color: #00b894 !important; border-color: #00b894 !important; }
        .lugar-errado { background-color: #f39c12 !important; border-color: #f39c12 !important; }
        .errada { background-color: #2c3e50 !important; border-color: #2c3e50 !important; }
        
        h1 { margin: 0; letter-spacing: 4px; }
        .mensagem { margin-top: 20px; font-weight: bold; height: 30px; color: #fff; }
        button { margin-top: 20px; padding: 10px 25px; font-size: 1rem; cursor: pointer; border-radius: 5px; border: none; background: #00b894; color: white; font-weight: bold; }
        button:hover { background: #019e7f; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const RESPOSTA_EXATA = "DACIO";

        function App() {
            const [palpites, setPalpites] = useState(Array(6).fill(""));
            const [rodadaAtual, setRodadaAtual] = useState(0);
            const [textoDigitado, setTextoDigitado] = useState("");
            const [estadoDaPartida, setEstadoDaPartida] = useState("jogando");

            useEffect(() => {
                function lidarComTeclado(e) {
                    if (estadoDaPartida !== "jogando" || rodadaAtual >= 6) return;

                    if (e.key === "Enter") {
                        if (textoDigitado.length === 5) validarPalpite();
                    } else if (e.key === "Backspace") {
                        setTextoDigitado(prev => prev.slice(0, -1));
                    } else if (textoDigitado.length < 5 && /^[a-zA-Z]$/.test(e.key)) {
                        setTextoDigitado(prev => (prev + e.key).toUpperCase());
                    }
                }

                window.addEventListener("keydown", lidarComTeclado);
                return () => window.removeEventListener("keydown", lidarComTeclado);
            }, [textoDigitado, estadoDaPartida, rodadaAtual]);

            function validarPalpite() {
                const novosPalpites = [...palpites];
                novosPalpites[rodadaAtual] = textoDigitado;
                setPalpites(novosPalpites);

                if (textoDigitado === RESPOSTA_EXATA) {
                    setEstadoDaPartida("venceu");
                } else if (rodadaAtual === 5) {
                    setEstadoDaPartida("perdeu");
                }

                setRodadaAtual(prev => prev + 1);
                setTextoDigitado("");
            }

            return (
                <div className="jogo-container">
                    <h1>TERMO</h1>
                    <div className="mensagem">
                        {estadoDaPartida === "venceu" && "PARABÉNS! VOCÊ ACERTOU! 🎉"}
                        {estadoDaPartida === "perdeu" && `FIM DE JOGO! PALAVRA: ${RESPOSTA_EXATA}`}
                    </div>
                    
                    <div className="grade">
                        {palpites.map((palavraGravada, i) => (
                            <div key={i} className="linha">
                                {(i === rodadaAtual ? textoDigitado.padEnd(5, " ") : palavraGravada.padEnd(5, " "))
                                    .split("").map((letra, j) => {
                                        let cor = "";
                                        if (i < rodadaAtual) {
                                            if (letra === RESPOSTA_EXATA[j]) cor = "correta";
                                            else if (RESPOSTA_EXATA.includes(letra)) cor = "lugar-errado";
                                            else cor = "errada";
                                        }
                                        return (
                                            <div key={j} className={`quadrado ${cor}`}>
                                                {letra !== " " ? letra : ""}
                                            </div>
                                        )
                                    })
                                }
                            </div>
                        ))}
                    </div>

                    {estadoDaPartida !== "jogando" && (
                        <button onClick={() => window.location.reload()}>JOGAR NOVAMENTE</button>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
